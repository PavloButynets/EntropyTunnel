services:
  server:
    build:
      context: .
      dockerfile: EntropyTunnel.Server/Dockerfile
    environment:
      URLS: "http://+:8080"
      ASPNETCORE_URLS: "http://+:8080"
      AllowedOrigins__0: "http://130.61.202.172"
      AllowedOrigins__1: "http://ui"
      DashboardBaseUrl: "http://local130.61.202.172host"
    ports:
      - "8080:8080"
    restart: unless-stopped

  ui:
    build:
      context: ./EntropyTunnel.Dashboard
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
