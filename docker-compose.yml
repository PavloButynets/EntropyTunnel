services:
  server:
    build:
      context: .
      dockerfile: EntropyTunnel.Server/Dockerfile
    environment:
      URLS: "http://+:8080"
      ASPNETCORE_URLS: "http://+:8080"
      AllowedOrigins__0: "https://entropy-tunnel.xyz"
      AllowedOrigins__1: "https://www.entropy-tunnel.xyz"
      AllowedOrigins__2: "http://ui"
      DashboardBaseUrl: "https://entropy-tunnel.xyz"
    ports:
      - "8080:8080"
    restart: unless-stopped

  ui:
    build:
      context: ./EntropyTunnel.Dashboard
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - server
    restart: unless-stopped
