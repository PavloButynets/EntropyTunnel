server {
    listen 80;
    server_name entropy-tunnel.xyz www.entropy-tunnel.xyz 130.61.202.172 130.61.202.172.nip.io localhost;

    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass         http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    location /tunnel {
        proxy_pass         http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    location /dashboard {
        index index.html;
        try_files $uri $uri/ /dashboard/index.html;
    }

    location / {
        proxy_pass https://entropy-tunnel.vercel.app;
        proxy_set_header Host entropy-tunnel.vercel.app;
        
        proxy_ssl_server_name on; 
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name *.entropy-tunnel.xyz *.130.61.202.172.nip.io;

    location / {
        proxy_pass         http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}