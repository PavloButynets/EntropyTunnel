# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name entropy-tunnel.xyz www.entropy-tunnel.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name entropy-tunnel.xyz www.entropy-tunnel.xyz;

    ssl_certificate     /etc/letsencrypt/live/entropy-tunnel.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entropy-tunnel.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass         http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    location /tunnel {
        proxy_pass         http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    location /dashboard {
        index index.html;
        try_files $uri $uri/ /dashboard/index.html;
    }

    location / {
        proxy_pass https://entropy-tunnel.vercel.app;
        proxy_set_header Host entropy-tunnel.vercel.app;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name *.entropy-tunnel.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name *.entropy-tunnel.xyz;

    ssl_certificate     /etc/letsencrypt/live/entropy-tunnel.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entropy-tunnel.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
