name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  tag:
    name: Auto-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  build-and-release:
    name: Build and Create Release
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish Windows x64
        run: dotnet publish EntropyTunnel.Client/EntropyTunnel.Client.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/win

      - name: Publish Linux x64
        run: dotnet publish EntropyTunnel.Client/EntropyTunnel.Client.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/linux

      - name: Publish macOS arm64
        run: dotnet publish EntropyTunnel.Client/EntropyTunnel.Client.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -o ./publish/mac-arm

      - name: Rename binaries
        run: |
          mv ./publish/linux/EntropyTunnel.Client ./publish/linux/entropy-tunnel-linux-x64
          mv ./publish/mac-arm/EntropyTunnel.Client ./publish/mac-arm/entropy-tunnel-darwin-arm64
          mv ./publish/win/EntropyTunnel.Client.exe ./publish/win/entropy-tunnel-win-x64.exe

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: Release ${{ needs.tag.outputs.new_tag }}
          files: |
            ./publish/win/entropy-tunnel-win-x64.exe
            ./publish/linux/entropy-tunnel-linux-x64
            ./publish/mac-arm/entropy-tunnel-darwin-arm64
          generate_release_notes: true

  deploy:
    name: Deploy to server
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull
            docker compose up --build -d
