name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: 🚀 Publish Windows (x64)
        run: dotnet publish EntropyTunnel.Client/EntropyTunnel.Client.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/win

      - name: 🚀 Publish Linux (x64)
        run: dotnet publish EntropyTunnel.Client/EntropyTunnel.Client.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/linux

      - name: 🚀 Publish macOS
        run: dotnet publish EntropyTunnel.Client/EntropyTunnel.Client.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -o ./publish/mac-arm
      - name: 🏷️ Rename binaries
        run: |
          mv ./publish/linux/EntropyTunnel.Client ./publish/linux/entropy-tunnel-linux-x64
          mv ./publish/mac-arm/EntropyTunnel.Client ./publish/mac-arm/entropy-tunnel-darwin-arm64
          mv ./publish/win/EntropyTunnel.Client.exe ./publish/win/entropy-tunnel-win-x64.exe

      - name: 📦 Create GitHub Release and Upload ALL Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./publish/win/entropy-tunnel-win-x64.exe
            ./publish/linux/entropy-tunnel-linux-x64
            ./publish/mac-arm/entropy-tunnel-darwin-arm64
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
